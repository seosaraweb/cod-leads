[build]
buildCommand = "pip install openpyxl --break-system-packages && cd frontend && npm install && npm run build && cp -r build ../backend/public && cd ../backend && npm install"

[deploy]
startCommand = "cd backend && node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
